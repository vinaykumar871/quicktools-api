<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Generator - QuickTools</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <style>
    .box {
      max-width: 500px;
      margin: 60px auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      font-size: 16px;
    }

    .options {
      margin: 10px 0;
    }

    .options label {
      display: block;
      margin: 5px 0;
    }

    button {
      padding: 10px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }

    .strength {
      margin-top: 10px;
      font-weight: bold;
    }

    .weak { color: red; }
    .medium { color: orange; }
    .strong { color: green; }
  </style>
</head>

<body>

<div class="box">
  <h2>🔐 Password Generator</h2>

  <input type="text" id="password" readonly placeholder="Generated password">

  <label>Length: <span id="lenVal">12</span></label>
  <input type="range" id="length" min="4" max="20" value="12">

  <div class="options">
    <label><input type="checkbox" id="upper" checked> Uppercase</label>
    <label><input type="checkbox" id="lower" checked> Lowercase</label>
    <label><input type="checkbox" id="number" checked> Numbers</label>
    <label><input type="checkbox" id="symbol" checked> Symbols</label>
  </div>

  <button onclick="generatePassword()">Generate</button>
  <button onclick="copyPassword()">Copy</button>

  <p class="strength" id="strength"></p>
</div>

<script>
const lengthSlider = document.getElementById("length");
const lenVal = document.getElementById("lenVal");

lengthSlider.oninput = () => {
  lenVal.innerText = lengthSlider.value;
};

function generatePassword() {
  const length = lengthSlider.value;

  const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const lower = "abcdefghijklmnopqrstuvwxyz";
  const number = "0123456789";
  const symbol = "!@#$%^&*()_+";

  let chars = "";

  if (document.getElementById("upper").checked) chars += upper;
  if (document.getElementById("lower").checked) chars += lower;
  if (document.getElementById("number").checked) chars += number;
  if (document.getElementById("symbol").checked) chars += symbol;

  if (!chars) {
    alert("Select at least one option");
    return;
  }

  let password = "";

  for (let i = 0; i < length; i++) {
    password += chars[Math.floor(Math.random() * chars.length)];
  }

  document.getElementById("password").value = password;

  checkStrength(password);
}

function copyPassword() {
  const pass = document.getElementById("password");

  if (!pass.value) return;

  navigator.clipboard.writeText(pass.value);
  alert("Copied!");
}

function checkStrength(password) {
  const strengthText = document.getElementById("strength");

  let strength = 0;

  if (password.length >= 8) strength++;
  if (/[A-Z]/.test(password)) strength++;
  if (/[0-9]/.test(password)) strength++;
  if (/[^A-Za-z0-9]/.test(password)) strength++;

  if (strength <= 2) {
    strengthText.innerText = "Weak Password";
    strengthText.className = "strength weak";
  } else if (strength === 3) {
    strengthText.innerText = "Medium Password";
    strengthText.className = "strength medium";
  } else {
    strengthText.innerText = "Strong Password";
    strengthText.className = "strength strong";
  }
}
</script>

</body>
</html>
