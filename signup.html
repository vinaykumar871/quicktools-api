<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - QuickTools</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">

<div class="login-container">
  <h2>Sign Up</h2>

 <input type="email" id="email" placeholder="Enter email">
 <input type="password" id="password" placeholder="Enter password">

  <button onclick="signup()">Create Account</button>

  <p id="msg"></p>

  <p>Already have account? <a href="login.html">Login</a></p>
</div>

<script>

async function signup() {
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");

  if (!emailInput || !passwordInput) {
    console.log("Input IDs wrong ❌");
    return;
  }

  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();

  console.log("Sending:", email, password);

  if (!email || !password) {
    document.getElementById("msg").innerText = "⚠️ Fill all fields";
    return;
  }

  try {
    const res = await fetch("https://quicktools-backend-b775.onrender.com/signup", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ username: email, password })
    });

    const data = await res.json();
    console.log("Response:", data);

    if (data.success) {
      document.getElementById("msg").innerText = "✅ Account created!";
      document.getElementById("msg").style.color = "green";
    } else {
      document.getElementById("msg").innerText = data.message;
    }

  } catch (err) {
    console.log(err);
    document.getElementById("msg").innerText = "❌ Server error";
  }
}

</script>

</body>
</html>
