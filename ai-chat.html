<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Chat - QuickTools</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <style>
    .chat-box {
      max-width: 600px;
      margin: 40px auto;
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    #chat {
      height: 300px;
      overflow-y: auto;
      margin-bottom: 10px;
      padding: 10px;
      border: 1px solid #ddd;
    }

    .msg {
      margin: 5px 0;
    }

    .user {
      text-align: right;
      color: #4f46e5;
    }

    .bot {
      text-align: left;
      color: #111;
    }

    input {
      width: 75%;
      padding: 10px;
    }

    button {
      padding: 10px;
      background: #4f46e5;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="chat-box">
  <h2>🤖 AI Chat Assistant</h2>

  <div id="chat"></div>

  <input type="text" id="userInput" placeholder="Ask something...">
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const backend = "https://quicktools-backend-b775.onrender.com";

async function sendMessage() {
  const input = document.getElementById("userInput");
  const chat = document.getElementById("chat");

  const text = input.value.trim();
  if (!text) return;

  chat.innerHTML += `<div class="msg user">You: ${text}</div>`;
  input.value = "";

  try {
    const res = await fetch(backend + "/ai-chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt: text })
    });

    const data = await res.json();

    chat.innerHTML += `<div class="msg bot">AI: ${data.reply}</div>`;
    chat.scrollTop = chat.scrollHeight;

  } catch (err) {
    chat.innerHTML += `<div class="msg bot">Error connecting to AI</div>`;
  }
}
</script>

</body>
</html>
