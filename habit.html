<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Habit Tracker - QuickTools</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <style>
    .habit-box {
      max-width: 500px;
      margin: 60px auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    input {
      width: 70%;
      padding: 10px;
    }

    button {
      padding: 10px;
      background: #4f46e5;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 6px;
    }

    .habit {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px 0;
      padding: 10px;
      background: #eef2ff;
      border-radius: 8px;
    }

    .done {
      background: #22c55e;
      color: white;
    }

    .streak {
      font-size: 14px;
      color: #555;
    }
  </style>
</head>

<body>

<div class="habit-box">
  <h2>📈 Habit Tracker</h2>

  <input type="text" id="habitInput" placeholder="Enter habit">
  <button onclick="addHabit()">Add</button>

  <div id="habitList"></div>
</div>

<script>
let habits = JSON.parse(localStorage.getItem("habits")) || [];
let today = new Date().toDateString();

// 🔁 Reset daily status
habits.forEach(h => {
  if (h.lastDate !== today) {
    h.done = false;
  }
});

function saveHabits() {
  localStorage.setItem("habits", JSON.stringify(habits));
}

// 📊 Render
function renderHabits() {
  const container = document.getElementById("habitList");
  container.innerHTML = "";

  habits.forEach((h, i) => {
    const div = document.createElement("div");
    div.className = "habit " + (h.done ? "done" : "");

    div.innerHTML = `
      <span onclick="toggleHabit(${i})">${h.name}</span>
      <span class="streak">🔥 ${h.streak}</span>
      <button onclick="deleteHabit(${i})">❌</button>
    `;

    container.appendChild(div);
  });
}

// ➕ Add
function addHabit() {
  const input = document.getElementById("habitInput");

  if (!input.value.trim()) return;

  habits.push({
    name: input.value,
    streak: 0,
    done: false,
    lastDate: today
  });

  input.value = "";
  saveHabits();
  renderHabits();
}

// ✔ Toggle
function toggleHabit(i) {
  if (habits[i].done) return;

  habits[i].done = true;
  habits[i].streak += 1;
  habits[i].lastDate = today;

  saveHabits();
  renderHabits();
}

// ❌ Delete
function deleteHabit(i) {
  habits.splice(i, 1);
  saveHabits();
  renderHabits();
}

// 🚀 Init
saveHabits();
renderHabits();
</script>

</body>
</html>
